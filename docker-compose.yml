services:
  db:
    image: pgvector/pgvector:pg16
    container_name: tadan-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tadan
      POSTGRES_PASSWORD: tadan_dev
      POSTGRES_DB: tadan
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
